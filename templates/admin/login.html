<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Mahamaya Real Estate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}"><i class="bi bi-info-circle-fill"></i> {{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="admin-login-page">
        <div class="admin-login-card">
            <div class="text-center mb-4">
                <i class="bi bi-building display-4" style="color:var(--primary);"></i>
            </div>
            <h2>Admin Login</h2>
            <p>Sign in to manage your real estate dashboard</p>
            <form method="POST" action="{{ url_for('admin.login') }}">
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border:2px solid var(--border);border-right:none;border-radius:10px 0 0 10px;background:var(--bg);"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control form-control-custom" id="username" name="username" placeholder="Enter username" required style="border-radius:0 10px 10px 0;">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border:2px solid var(--border);border-right:none;border-radius:10px 0 0 10px;background:var(--bg);"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="Enter password" required style="border-radius:0 10px 10px 0;">
                    </div>
                </div>
                <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:14px;"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
            </form>
            <div class="text-center mt-4">
                <a href="{{ url_for('main.home') }}" style="color:var(--text-light);font-size:0.9rem;"><i class="bi bi-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
