{% extends 'admin/base_admin.html' %}
{% block admin_title %}Edit Plot{% endblock %}

{% block admin_content %}
<div class="admin-header">
    <h2><i class="bi bi-pencil-square me-2"></i>Edit Plot</h2>
    <a href="{{ url_for('admin.manage_plots') }}" class="btn btn-outline-secondary" style="border-radius:10px;"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div style="background:var(--bg-white);border-radius:var(--radius-lg);padding:35px;box-shadow:var(--shadow-sm);border:1px solid var(--border);max-width:800px;">
    <form method="POST" action="{{ url_for('admin.edit_plot', plot_id=plot.id) }}" enctype="multipart/form-data">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Plot Title <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control form-control-custom" value="{{ plot.title }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Price (₹) <span class="text-danger">*</span></label>
                <input type="number" name="price" class="form-control form-control-custom" value="{{ plot.price|int }}" min="1" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Location <span class="text-danger">*</span></label>
                <input type="text" name="location" class="form-control form-control-custom" value="{{ plot.location }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Size <span class="text-danger">*</span></label>
                <input type="text" name="size" class="form-control form-control-custom" value="{{ plot.size }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Plot Type</label>
                <select name="plot_type" class="form-select form-control-custom">
                    <option value="Residential" {% if plot.plot_type == 'Residential' %}selected{% endif %}>Residential</option>
                    <option value="Commercial" {% if plot.plot_type == 'Commercial' %}selected{% endif %}>Commercial</option>
                    <option value="Agricultural" {% if plot.plot_type == 'Agricultural' %}selected{% endif %}>Agricultural</option>
                    <option value="Industrial" {% if plot.plot_type == 'Industrial' %}selected{% endif %}>Industrial</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control form-control-custom" rows="4">{{ plot.description or '' }}</textarea>
            </div>
            <div class="col-12">
                <label class="form-label">Plot Image</label>
                {% if plot.image_filename and plot.image_filename != 'default_plot.jpg' %}
                <div class="mb-2"><img src="{{ url_for('static', filename='uploads/' + plot.image_filename) }}" style="max-height:150px;border-radius:10px;" alt="Current"></div>
                {% endif %}
                <input type="file" name="image" id="image-upload" class="form-control form-control-custom" accept="image/*">
                <img id="image-preview" src="" alt="Preview" style="display:none;max-height:200px;margin-top:12px;border-radius:10px;">
                <small class="text-muted">Leave empty to keep current image.</small>
            </div>
            <div class="col-md-6">
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" name="is_featured" id="is_featured" {% if plot.is_featured %}checked{% endif %}>
                    <label class="form-check-label" for="is_featured">Mark as Featured</label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" name="is_available" id="is_available" {% if plot.is_available %}checked{% endif %}>
                    <label class="form-check-label" for="is_available">Available for Sale</label>
                </div>
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn-primary-custom" style="padding:14px 40px;"><i class="bi bi-check-lg"></i> Update Plot</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
