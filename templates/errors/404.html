{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding-top:80px;">
    <div>
        <h1 style="font-size:6rem;color:var(--primary-light);font-family:'Inter',sans-serif;font-weight:800;margin-bottom:0;">404</h1>
        <h3 class="mb-3">Page Not Found</h3>
        <p class="text-muted mb-4" style="max-width:400px;margin:0 auto;">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('main.home') }}" class="btn-primary-custom"><i class="bi bi-house"></i> Back to Home</a>
    </div>
</section>
{% endblock %}
